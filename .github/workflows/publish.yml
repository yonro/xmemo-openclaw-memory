name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, without the v prefix. Must match package.json."
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}. Expected ${expected_tag}."
              exit 1
            fi
          else
            requested_version="${{ github.event.inputs.version }}"
            if [[ "${requested_version}" != "${package_version}" ]]; then
              echo "::error::workflow_dispatch version ${requested_version} does not match package.json version ${package_version}."
              exit 1
            fi

            if ! git tag --points-at HEAD | grep -Fxq "${expected_tag}"; then
              echo "::error::Manual publish must run from a commit tagged ${expected_tag}."
              exit 1
            fi
          fi

          echo "Release version: ${package_version}"
          echo "Release tag: ${expected_tag}"

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Publish to npm
        run: npm publish --provenance --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Validate ClawHub package
        run: npx --yes clawhub@0.22.0 package validate .

      - name: Log in to ClawHub
        run: npx --yes clawhub@0.22.0 login --token "$CLAWHUB_TOKEN" --no-input --no-browser
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish to ClawHub
        run: npx --yes clawhub@0.22.0 package publish . --json
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
